upstream django_app {
    server django:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 30M;

    # Static served directly by Nginx. Use revalidation (no-cache) rather than
    # a long max-age: with DEBUG=True Django emits unhashed static URLs, so a
    # long cache would serve stale JS/CSS after a redeploy. The browser keeps a
    # cached copy but revalidates via ETag (cheap 304 when unchanged).
    location /static/ {
        alias /app/staticfiles/;
        add_header Cache-Control "no-cache, must-revalidate";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # WebSocket endpoints (Django Channels / Daphne).
    location /ws/ {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Everything else → Daphne (ASGI).
    location / {
        proxy_pass http://django_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
