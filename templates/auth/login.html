{% extends 'base.html' %}
{% block title %}Login · iTrendTASKS{% endblock %}
{% block fullpage %}
<div class="login-wrap">
  <div class="card login-card shadow-lg">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <h3 class="fw-bold text-primary"><i class="bi bi-kanban-fill"></i> iTrendTASKS</h3>
        <p class="text-muted mb-0">Employee Task Management</p>
      </div>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
        {% csrf_token %}
        <div class="mb-3">
          <input type="email" name="email" class="form-control" placeholder="Email address" required autofocus />
        </div>
        <div class="mb-3">
          <div class="input-group">
            <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Password" required />
            <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1" title="Show / hide password">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button class="btn btn-primary w-100">Sign In</button>
      </form>
      <script>
        document.getElementById('togglePassword').addEventListener('click', function () {
          var inp = document.getElementById('passwordInput');
          var icon = document.getElementById('eyeIcon');
          if (inp.type === 'password') {
            inp.type = 'text';
            icon.className = 'bi bi-eye-slash';
          } else {
            inp.type = 'password';
            icon.className = 'bi bi-eye';
          }
        });
      </script>
    </div>
  </div>
</div>
{% endblock %}
